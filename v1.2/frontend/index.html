<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这也能代 - It Clicks V1.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .header {
            padding: 14px 20px 10px;
            background: transparent;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 400;
            color: #666;
            letter-spacing: 0.02em;
        }
        .feed-viewport {
            position: relative;
            height: calc(100vh - 48px - 64px);
            max-width: 560px;
            margin: 0 auto;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .footer-hint {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 20px calc(8px + env(safe-area-inset-bottom, 0));
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        .footer-hint a { color: #999; text-decoration: none; }
        .footer-hint a:hover { color: #666; }
        .fixed-bar {
            position: fixed;
            bottom: calc(28px + env(safe-area-inset-bottom, 0));
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: transparent;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .fixed-bar .fixed-bar-cta {
            display: inline-block;
            padding: 8px 14px;
            background: #5c5c5c;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            flex-shrink: 0;
        }
        .fixed-bar .fixed-bar-cta:hover { background: #454545; color: #fff; }
        .fixed-bar .fixed-bar-btn {
            padding: 8px 14px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #666;
            flex-shrink: 0;
        }
        .fixed-bar .fixed-bar-btn:hover { background: #f5f5f5; color: #333; }
        .fixed-bar .fixed-bar-btn-subtle {
            opacity: 0.82;
        }
        .fixed-bar .fixed-bar-btn-subtle:hover { opacity: 1; }
        .feed-deck {
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .feed-slide {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 20px;
            box-sizing: border-box;
        }
        .card-wrap { width: 100%; }
        .feed-slide .card {
            width: 100%;
            max-height: 100%;
            overflow: auto;
            margin: 0;
        }
        .feed { max-width: 560px; margin: 0 auto; }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            padding: 32px 28px;
        }
        .card .text {
            font-size: 17px;
            line-height: 2;
            color: #2c2c2c;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .feed-viewport .loading-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            background: #fafafa;
            padding: 24px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            max-width: 340px;
            box-sizing: border-box;
        }
        .feed-viewport .loading-inner code { background: #eee; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
        .feed-viewport .loading-inner[hidden] { display: none; }
        .load-more {
            position: fixed;
            bottom: calc(76px + env(safe-area-inset-bottom, 0));
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px 20px;
        }
        .load-more button {
            padding: 10px 24px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #666;
        }
        .load-more button:hover { background: #f5f5f5; }
        .load-more button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <h1>It Clicks</h1>
    </div>
    <div class="feed-viewport" id="feedViewport">
        <div class="loading-inner" id="loadingInner">加载中…</div>
        <div class="feed-deck" id="feed"></div>
    </div>
    <div class="fixed-bar" id="fixedBar" style="display: none;">
        <button type="button" id="fixedBarDislike" class="fixed-bar-btn">代不了</button>
        <a href="#" id="fixedBarCta" class="fixed-bar-cta">代一下！</a>
        <button type="button" id="fixedBarCopy" class="fixed-bar-btn fixed-bar-btn-subtle">复制文案</button>
        <button type="button" id="fixedBarExport" class="fixed-bar-btn fixed-bar-btn-subtle">导出图片</button>
    </div>
    <div class="load-more" id="loadMore" style="display: none;">
        <button type="button" id="loadMoreBtn">加载更多</button>
    </div>
    <div class="footer-hint">
        <a href="seed.html">滚轮|下滑刷新</a>
    </div>
    <div class="loading" id="loading" style="display: none;">加载中…</div>
    <script src="analytics.js"></script>
    <script src="card-export.js"></script>
    <script>
        window.__PAGE__ = 'feed';
        document.addEventListener('DOMContentLoaded', function() {
            if (window.Analytics) window.Analytics.track('session_start', { referrer: document.referrer || '', entry_url: location.href });
        });

        var FEED_URL = 'api/feed';
        var feedEl = document.getElementById('feed');
        var feedViewport = document.getElementById('feedViewport');
        var loadingInner = document.getElementById('loadingInner');
        var loadMoreEl = document.getElementById('loadMore');
        var loadMoreBtn = document.getElementById('loadMoreBtn');
        var nextCursor = null;
        var loading = false;
        var seenSeeds = {};
        var seenSeedIds = [];
        var scrollDepthSent = {};
        var currentIndex = 0;
        var slideCount = 0;
        var animating = false;
        var canLoadMore = false;
        var cardDataList = [];

        function renderCard(item, position) {
            var wrap = document.createElement('div');
            wrap.className = 'card-wrap';
            var card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-seed-id', item.id);
            card.setAttribute('data-position', position);
            card.innerHTML = '<div class="text">' + escapeHtml(item.text) + '</div>';
            wrap.appendChild(card);
            return wrap;
        }

        function updateFixedBar() {
            var bar = document.getElementById('fixedBar');
            var cta = document.getElementById('fixedBarCta');
            var copyBtn = document.getElementById('fixedBarCopy');
            var exportBtn = document.getElementById('fixedBarExport');
            if (!bar || !cta || !copyBtn || !exportBtn) return;
            if (slideCount <= 0 || currentIndex < 0 || currentIndex >= cardDataList.length) {
                bar.style.display = 'none';
                return;
            }
            var data = cardDataList[currentIndex];
            bar.style.display = 'flex';
            bar.dataset.seedId = data.id;
            cta.href = 'customize.html?ref=' + data.ref;
            copyBtn.setAttribute('data-copy', data.text);
            exportBtn.setAttribute('data-export', data.text);
        }

        function setupFixedBarHandlers() {
            var bar = document.getElementById('fixedBar');
            var copyBtn = document.getElementById('fixedBarCopy');
            var exportBtn = document.getElementById('fixedBarExport');
            var dislikeBtn = document.getElementById('fixedBarDislike');
            if (!copyBtn || !exportBtn) return;
            copyBtn.addEventListener('click', function() {
                var t = this.getAttribute('data-copy');
                if (!t) return;
                navigator.clipboard.writeText(t).then(function() {
                    if (window.Analytics) window.Analytics.track('copy_seed', { seed_id: String(bar.dataset.seedId || ''), copy_len: t.length });
                    copyBtn.textContent = '已复制';
                    setTimeout(function() { copyBtn.textContent = '复制文案'; }, 1500);
                });
            });
            exportBtn.addEventListener('click', function() {
                var t = this.getAttribute('data-export');
                if (!t || !window.exportCardImage) return;
                window.exportCardImage(t);
                if (window.Analytics) window.Analytics.track('export_image', { seed_id: String(bar.dataset.seedId || '') });
            });
            if (dislikeBtn) {
                dislikeBtn.addEventListener('click', function() {
                    var seedId = String(bar.dataset.seedId || '');
                    if (window.Analytics) window.Analytics.track('dislike_seed', { seed_id: seedId, position: currentIndex + 1 });
                    dislikeBtn.textContent = '已点踩';
                    setTimeout(function() { dislikeBtn.textContent = '代不了'; }, 1200);
                });
            }
        }
        setupFixedBarHandlers();

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
        function escapeAttr(s) {
            return s.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function updateDeckTransform() {
            if (slideCount <= 0) return;
            var pct = (currentIndex * 100) / slideCount;
            feedEl.style.transform = 'translateY(-' + pct + '%)';
        }

        function goToSlide(index) {
            if (slideCount <= 0 || animating) return;
            var next = Math.max(0, Math.min(index, slideCount - 1));
            if (next === currentIndex) return;
            animating = true;
            currentIndex = next;
            updateDeckTransform();
            updateFixedBar();
            updateLoadMoreVisibility();
            if (window.Analytics) window.Analytics.track('scroll_depth', { depth_percent: Math.round((currentIndex / Math.max(1, slideCount - 1)) * 100), max_position_seen: currentIndex });
            setTimeout(function() { animating = false; }, 420);
        }

        function updateLoadMoreVisibility() {
            var show = slideCount > 0 && currentIndex === slideCount - 1 && canLoadMore;
            loadMoreEl.style.display = show ? 'block' : 'none';
        }

        function setupFeedNavigation() {
            if (!feedViewport || !feedEl) return;
            feedViewport.addEventListener('wheel', function(e) {
                if (slideCount <= 0 || animating) return;
                e.preventDefault();
                if (e.deltaY > 0) {
                    if (currentIndex < slideCount - 1) goToSlide(currentIndex + 1);
                    else if (loadMoreEl.style.display === 'block') loadMoreBtn.click();
                } else {
                    goToSlide(currentIndex - 1);
                }
            }, { passive: false });

            var touchStartY = 0;
            feedViewport.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) touchStartY = e.touches[0].clientY;
            }, { passive: true });
            feedViewport.addEventListener('touchend', function(e) {
                if (e.changedTouches.length !== 1 || slideCount <= 0 || animating) return;
                var touchEndY = e.changedTouches[0].clientY;
                var delta = touchStartY - touchEndY;
                if (delta > 50) {
                    if (currentIndex < slideCount - 1) goToSlide(currentIndex + 1);
                    else if (loadMoreEl.style.display === 'block') loadMoreBtn.click();
                } else if (delta < -50) {
                    goToSlide(currentIndex - 1);
                }
            }, { passive: true });
        }

        function setupViewSeedObserver() {
            if (!window.Analytics || !window.IntersectionObserver) return;
            var cards = feedEl.querySelectorAll('.card[data-seed-id]');
            cards.forEach(function(card) {
                var seedId = card.getAttribute('data-seed-id');
                var position = card.getAttribute('data-position');
                var key = seedId;
                if (seenSeeds[key]) return;
                var timer = null;
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (!entry.isIntersecting) {
                            if (timer) clearTimeout(timer);
                            timer = null;
                            return;
                        }
                        var r = entry.boundingClientRect();
                        var visible = entry.intersectionRatio;
                        if (visible >= 0.6) {
                            timer = setTimeout(function() {
                                if (seenSeeds[key]) return;
                                seenSeeds[key] = true;
                                window.Analytics.track('view_seed', { seed_id: seedId, position: parseInt(position, 10) || 0 });
                            }, 600);
                        }
                    });
                }, { threshold: [0.6], rootMargin: '0px' });
                observer.observe(card);
            });
        }

        function setupScrollDepth() {
            if (!window.Analytics) return;
            var container = document.documentElement;
            function onScroll() {
                var st = container.scrollTop || window.pageYOffset;
                var max = (container.scrollHeight || document.body.scrollHeight) - (container.clientHeight || window.innerHeight);
                if (max <= 0) return;
                var pct = Math.round((st / max) * 100);
                [10, 25, 50, 75, 90].forEach(function(d) {
                    if (pct >= d && !scrollDepthSent[d]) {
                        scrollDepthSent[d] = true;
                        window.Analytics.track('scroll_depth', { depth_percent: d, max_position_seen: 0 });
                    }
                });
            }
            window.addEventListener('scroll', onScroll, { passive: true });
        }

        function buildSlides(items, startPosition) {
            items.forEach(function(item, i) {
                var pos = startPosition + i;
                seenSeedIds.push(item.id);
                cardDataList.push({ id: item.id, text: item.text, ref: encodeURIComponent(item.text) });
                var card = renderCard(item, pos + 1);
                var slide = document.createElement('div');
                slide.className = 'feed-slide';
                slide.appendChild(card);
                feedEl.appendChild(slide);
            });
        }

        function refreshDeckLayout() {
            var slides = feedEl.querySelectorAll('.feed-slide');
            slideCount = slides.length;
            if (slideCount <= 0) return;
            feedEl.style.height = (slideCount * 100) + '%';
            slides.forEach(function(s) { s.style.height = (100 / slideCount) + '%'; });
            currentIndex = Math.min(currentIndex, slideCount - 1);
            updateDeckTransform();
        }

        function loadFeed(append) {
            if (loading) return;
            loading = true;
            if (!append) {
                loadingInner.removeAttribute('hidden');
                feedEl.innerHTML = '';
                cardDataList = [];
                currentIndex = 0;
                slideCount = 0;
            }
            var params = ['limit=10', 'mode=random'];
            if (seenSeedIds.length) {
                var excludeList = seenSeedIds.slice(-100).join(',');
                params.push('exclude=' + encodeURIComponent(excludeList));
            }
            var url = FEED_URL + '?' + params.join('&');
            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var items = data.items || [];
                    if (items.length === 0 && !append) {
                        loadingInner.textContent = '暂无内容';
                        loadingInner.removeAttribute('hidden');
                        updateFixedBar();
                    } else {
                        loadingInner.setAttribute('hidden', '');
                        var startPos = feedEl.querySelectorAll('.card').length;
                        buildSlides(items, startPos);
                        refreshDeckLayout();
                        updateFixedBar();
                    }
                    canLoadMore = items.length > 0;
                    nextCursor = data.next_cursor || null;
                    updateLoadMoreVisibility();
                    if (!append && window.Analytics) window.Analytics.track('view_page', { url: location.href });
                    if (!append) setupFeedNavigation();
                    setupViewSeedObserver();
                })
                .catch(function() {
                    loadingInner.removeAttribute('hidden');
                    loadingInner.innerHTML = '加载失败。若本地预览请先启动后端：在 <code>v1.2/backend</code> 下运行 <code>node server.js</code>，再用浏览器访问后端地址（如 http://localhost:端口）';
                })
                .finally(function() { loading = false; });
        }

        loadMoreBtn.addEventListener('click', function() { loadFeed(true); });
        loadFeed(false);
    </script>
</body>
</html>
