<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成你的版本 - It Clicks V1.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.7;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 560px; margin: 0 auto; }
        .back { margin-bottom: 20px; }
        .back a { color: #666; text-decoration: none; font-size: 14px; }
        .back a:hover { text-decoration: underline; }
        h1 { font-size: 20px; font-weight: 400; margin-bottom: 20px; }
        .ref-box {
            background: #f8f8f8;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .ref-box strong { color: #333; font-size: 12px; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #333; }
        .actions { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        button {
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        button.primary {
            background: #333;
            color: #fff;
            border: none;
        }
        button.primary:hover { background: #555; }
        button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary {
            background: #fff;
            color: #333;
            border: 1px solid #e5e5e5;
        }
        button.secondary:hover { background: #f5f5f5; }
        .result {
            margin-top: 28px;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.04);
            display: none;
        }
        .result.show { display: block; }
        .result .label { font-size: 12px; color: #999; margin-bottom: 8px; }
        .result .text { font-size: 17px; line-height: 2; color: #2c2c2c; white-space: pre-wrap; word-break: break-word; }
        .result .btns { margin-top: 16px; }
        .result .btns button { margin-right: 8px; margin-top: 8px; }
        .error { color: #c00; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back"><a href="/">← 返回</a></div>
        <h1>代一下家产</h1>
        <div class="ref-box" id="refBox" style="display: none;">
            <strong>参考句</strong><br>
            <span id="refText"></span>
        </div>
        <label for="input">用 1–3 句话描述家产的名字/关系/情绪</label>
        <textarea id="input" placeholder="例如：两个人很久没见，再见面时一个在躲，一个在等"></textarea>
        <div class="actions">
            <button type="button" class="primary" id="submitBtn">生成</button>
            <button type="button" class="secondary" id="regenerateBtn" style="display: none;">重新生成</button>
        </div>
        <div class="error" id="error"></div>
        <div class="result" id="result">
            <div class="label">生成结果</div>
            <div class="text" id="resultText"></div>
            <div class="btns">
                <button type="button" class="secondary" id="copyResultBtn">复制文案</button>
                <button type="button" class="secondary" id="exportImageBtn">导出图片</button>
            </div>
        </div>
    </div>
    <script src="/analytics.js"></script>
    <script src="/card-export.js"></script>
    <script>
        window.__PAGE__ = 'customize';
        document.addEventListener('DOMContentLoaded', function() {
            if (window.Analytics) {
                window.Analytics.track('session_start', { referrer: document.referrer || '', entry_url: location.href });
                window.Analytics.track('view_page', { url: location.href });
            }
        });

        var params = new URLSearchParams(location.search);
        var ref = params.get('ref');
        if (ref) {
            document.getElementById('refBox').style.display = 'block';
            document.getElementById('refText').textContent = decodeURIComponent(ref);
        }

        var inputEl = document.getElementById('input');
        var submitBtn = document.getElementById('submitBtn');
        var errorEl = document.getElementById('error');
        var resultEl = document.getElementById('result');
        var resultTextEl = document.getElementById('resultText');
        var copyResultBtn = document.getElementById('copyResultBtn');
        var regenerateBtn = document.getElementById('regenerateBtn');
        var lastRequestId = null;

        submitBtn.addEventListener('click', function() {
            var input = inputEl.value.trim();
            if (!input) {
                errorEl.textContent = '请输入 1–3 句描述';
                return;
            }
            errorEl.textContent = '';
            if (window.Analytics) {
                window.Analytics.track('submit_customize', { input_length: input.length, mode: 'customize' });
                window.Analytics.track('generate_seed_attempt', { endpoint: '/api/customize', mode: 'customize', has_context_tail: !!ref });
            }
            submitBtn.disabled = true;
            submitBtn.textContent = '生成中…';
            fetch('/api/customize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    input: input,
                    ref: ref ? decodeURIComponent(ref) : ''
                })
            })
                .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
                .then(function(o) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '生成';
                    if (!o.ok) {
                        errorEl.textContent = o.data.error || '生成失败';
                        return;
                    }
                    lastRequestId = o.data.request_id || null;
                    window.__PAGE__ = 'result';
                    resultTextEl.textContent = o.data.text || '';
                    resultEl.classList.add('show');
                    regenerateBtn.style.display = 'inline-block';
                })
                .catch(function() {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '生成';
                    errorEl.textContent = '网络错误，请重试';
                });
        });

        function copyText(el) {
            var t = resultTextEl.textContent;
            navigator.clipboard.writeText(t).then(function() {
                if (window.Analytics) window.Analytics.track('copy_seed', { request_id: lastRequestId, copy_len: t.length }, lastRequestId);
                var orig = el.textContent;
                el.textContent = '已复制';
                setTimeout(function() { el.textContent = orig; }, 1500);
            });
        }
        copyResultBtn.addEventListener('click', function() { copyText(this); });
        regenerateBtn.addEventListener('click', function() {
            if (window.Analytics) {
                window.Analytics.track('regenerate_customize', {
                    request_id: lastRequestId,
                    input_length: (inputEl.value || '').trim().length
                }, lastRequestId);
            }
            submitBtn.click();
        });
        var exportImageBtn = document.getElementById('exportImageBtn');
        if (exportImageBtn) {
            exportImageBtn.addEventListener('click', function() {
                var t = resultTextEl.textContent;
                if (t && window.exportCardImage) {
                    window.exportCardImage(t);
                    if (window.Analytics) window.Analytics.track('export_image', { request_id: lastRequestId }, lastRequestId);
                }
            });
        }
    </script>
</body>
</html>
