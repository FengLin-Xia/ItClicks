<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It Clicks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafafa;
            color: #333;
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 640px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #333;
            letter-spacing: 1px;
        }

        .seed-display {
            background: #fff;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 2px 24px rgba(0, 0, 0, 0.04);
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            line-height: 2;
            color: #2c2c2c;
            width: 100%;
            transition: all 0.3s ease;
        }

        .seed-display.loading {
            color: #ccc;
        }

        .hint {
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 32px;
            background: #fff;
            color: #333;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }

        button.primary {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        button.primary:hover {
            background: #555;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            padding: 12px;
            background: #fee;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>It Clicks</h1>

        <div class="seed-display" id="seedDisplay">正在生成...</div>

        <div class="actions">
            <button onclick="refreshSeed()" id="refreshBtn">换一换</button>
            <button class="primary" onclick="enterCanvas()" id="enterBtn">代一代</button>
        </div>
    </div>

    <script>
        const API_URL = '/api/generate';
        const seedDisplay = document.getElementById('seedDisplay');
        const refreshBtn = document.getElementById('refreshBtn');
        const enterBtn = document.getElementById('enterBtn');

        let currentSeed = '';
        let isLoading = false;

        // 页面加载时自动生成 seed
        window.onload = function() {
            generateSeed();
        };

        async function generateSeed() {
            if (isLoading) return;
            isLoading = true;
            refreshBtn.disabled = true;
            enterBtn.disabled = true;
            seedDisplay.classList.add('loading');
            seedDisplay.textContent = '正在生成...';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'seed',
                        op: 'continue',
                        context: {},
                        state: { tone: 'restrained' }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API 请求失败: ${response.status}`);
                }

                const data = await response.json();
                currentSeed = data.text.trim();
                seedDisplay.classList.remove('loading');
                seedDisplay.textContent = currentSeed;

            } catch (error) {
                console.error('生成失败:', error);
                seedDisplay.classList.remove('loading');
                seedDisplay.textContent = '生成失败，请重试';
            } finally {
                isLoading = false;
                refreshBtn.disabled = false;
                enterBtn.disabled = false;
            }
        }

        function refreshSeed() {
            generateSeed();
        }

        function enterCanvas() {
            if (!currentSeed) {
                alert('请等待 seed 生成完成');
                return;
            }
            // 将 seed 存储到 localStorage
            localStorage.setItem('itclicks-seed', currentSeed);
            // 跳转到画布页
            window.location.href = '/canvas.html';
        }
    </script>
</body>
</html>
